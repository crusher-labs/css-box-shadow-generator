<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box-Shadow Generator</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css" integrity="sha384-EIv1tRpD4TjJA0H6sAVfeiJJyJt6DwPxbTYWSsJzylRFMkqMI6xVARApOqqWm5iI" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css" integrity="sha384-QYfQeMTJKWZuoEgfBv8ZvJwG12qr6YW8SF6ziK3aHL9luxKjnoswdj/yek7EwpJN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css" integrity="sha384-+mIUnYgeB+0Qf10OjT3tSbT2al2Y8erQfw/uws4os7AxVKNLYeEUW5zHUehGBTVq" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js" integrity="sha384-gNDnPKn5AoF0e4Q555fGbM+snO+UCP3/z4ErG3cyS/Akusg/bzTO+AYmG1WAMnab" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tool-mono { font-family: 'JetBrains Mono', monospace; }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 18rem), 1fr));
            gap: var(--crusher-spacing-6);
            max-width: 48rem;
            margin-inline: auto;
        }
        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-4); }
        .tool-preview-section { padding: var(--crusher-spacing-6); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--crusher-spacing-4); }

        .tool-field { display: grid; gap: var(--crusher-spacing-1); }
        .tool-label { font-size: var(--crusher-font-size-xs); color: var(--crusher-text-secondary); }
        .tool-value { font-size: var(--crusher-font-size-xs); font-family: 'JetBrains Mono', monospace; color: var(--crusher-text-primary); }
        .tool-inset { display: flex; align-items: center; gap: var(--crusher-spacing-2); color: var(--crusher-text-primary); }
        .tool-inset input { accent-color: var(--crusher-color-brand-primary); }

        #preview {
            inline-size: 8rem; block-size: 8rem;
            background: var(--crusher-color-brand-primary);
            border-radius: var(--crusher-radius-lg);
            transition: box-shadow var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard);
        }

        .tool-code-wrap { inline-size: 100%; display: grid; gap: var(--crusher-spacing-2); }
        textarea.crusher-tool-control { padding: var(--crusher-spacing-3); font-size: var(--crusher-font-size-xs); }
        .tool-copy-btn {
            align-self: flex-start;
            background: transparent; border: 0; padding: 0;
            cursor: pointer; font-weight: 500;
            font-size: var(--crusher-font-size-sm); color: var(--crusher-color-brand-primary);
        }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">CSS Box-Shadow Generator</h1>
            <p class="crusher-tool-lede">Generate CSS box-shadow code.</p>
        </header>

        <div class="tool-grid">
            <section class="crusher-tool-surface tool-section">
                <div class="tool-field">
                    <label for="x" class="tool-label">Offset X</label>
                    <input type="range" id="x" min="-50" max="50" value="0">
                    <span id="x-val" class="tool-value">0px</span>
                </div>
                <div class="tool-field">
                    <label for="y" class="tool-label">Offset Y</label>
                    <input type="range" id="y" min="-50" max="50" value="4">
                    <span id="y-val" class="tool-value">4px</span>
                </div>
                <div class="tool-field">
                    <label for="blur" class="tool-label">Blur</label>
                    <input type="range" id="blur" min="0" max="50" value="6">
                    <span id="blur-val" class="tool-value">6px</span>
                </div>
                <div class="tool-field">
                    <label for="spread" class="tool-label">Spread</label>
                    <input type="range" id="spread" min="-20" max="20" value="0">
                    <span id="spread-val" class="tool-value">0px</span>
                </div>
                <div class="tool-field">
                    <label for="opacity" class="tool-label">Color Opacity</label>
                    <input type="range" id="opacity" min="0" max="1" step="0.01" value="0.1">
                    <span id="opacity-val" class="tool-value">0.1</span>
                </div>
                <label class="tool-inset"><input type="checkbox" id="inset"><span>Inset</span></label>
            </section>

            <section class="crusher-tool-surface tool-preview-section">
                <div id="preview"></div>
                <div class="tool-code-wrap">
                    <label for="code" class="tool-label">CSS Code</label>
                    <textarea id="code" rows="3" readonly class="crusher-tool-control tool-mono"></textarea>
                    <button id="copy-btn" type="button" class="tool-copy-btn">Copy</button>
                </div>
            </section>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M361.5 1.2c5 2.1 8.6 6.6 9.6 11.9L391 121l107.9 19.8c5.3 1 9.8 4.6 11.9 9.6s1.5 10.7-1.6 15.2L446.9 256l62.3 90.3c3.1 4.5 3.7 10.2 1.6 15.2s-6.6 8.6-11.9 9.6L391 391 371.1 498.9c-1 5.3-4.6 9.8-9.6 11.9s-10.7 1.5-15.2-1.6L256 446.9l-90.3 62.3c-4.5 3.1-10.2 3.7-15.2 1.6s-8.6-6.6-9.6-11.9L121 391 13.1 371.1c-5.3-1-9.8-4.6-11.9-9.6s-1.5-10.7 1.6-15.2L65.1 256 2.8 165.7c-3.1-4.5-3.7-10.2-1.6-15.2s6.6-8.6 11.9-9.6L121 121 140.9 13.1c1-5.3 4.6-9.8 9.6-11.9s10.7-1.5 15.2 1.6L256 65.1 346.3 2.8c4.5-3.1 10.2-3.7 15.2-1.6zM160 256a96 96 0 1 1 192 0 96 96 0 1 1 -192 0zm224 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0z"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 384 512" fill="currentColor" aria-hidden="true"><path d="M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js" integrity="sha384-RkuNGzCebUwZ5RZDFSKGQ7sDaUpdPfDxO088yXDMPM5CvJ4eBy2Jf/UhLwGay/4K" crossorigin="anonymous"></script>

    <script>
        const inputs = ['x', 'y', 'blur', 'spread', 'opacity'];
        inputs.forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', update);
        });
        document.getElementById('inset').addEventListener('change', update);

        function update() {
            const x = document.getElementById('x').value;
            const y = document.getElementById('y').value;
            const blur = document.getElementById('blur').value;
            const spread = document.getElementById('spread').value;
            const opacity = document.getElementById('opacity').value;
            const inset = document.getElementById('inset').checked;

            document.getElementById('x-val').textContent = x + 'px';
            document.getElementById('y-val').textContent = y + 'px';
            document.getElementById('blur-val').textContent = blur + 'px';
            document.getElementById('spread-val').textContent = spread + 'px';
            document.getElementById('opacity-val').textContent = opacity;

            const color = `rgba(0, 0, 0, ${opacity})`;
            const insetStr = inset ? 'inset ' : '';
            const shadow = `${insetStr}${x}px ${y}px ${blur}px ${spread}px ${color}`;

            document.getElementById('preview').style.boxShadow = shadow;
            document.getElementById('code').value = `box-shadow: ${shadow};`;
        }

        document.getElementById('copy-btn').addEventListener('click', async () => {
            const code = document.getElementById('code');
            const btn = document.getElementById('copy-btn');
            try {
                await navigator.clipboard.writeText(code.value);
            } catch {
                code.select();
                document.execCommand('copy');
            }
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
        });

        update();
    </script>
</body>
</html>
